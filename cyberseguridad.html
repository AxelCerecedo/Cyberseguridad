<div class="d-flex justify-content-end mb-4">
  <button class="btn btn-danger btn-lg shadow-sm" data-bs-toggle="modal" data-bs-target="#modalRegistroAlerta">
    <i class="bi bi-shield-plus"></i> + Registrar Nueva Alerta
  </button>
</div>

<div class="modal fade" id="modalRegistroAlerta" tabindex="-1" aria-labelledby="modalRegistroLabel" aria-hidden="true">
  <div class="modal-dialog modal-lg modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header bg-danger text-white" style="background-color: #7c1225 !important;">
        <h5 class="modal-title fw-bold" id="modalRegistroLabel">Captura Manual de Incidente (PGAC)</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <form id="formNuevaAlerta">
          <div class="row mb-3">
            <div class="col-md-6">
              <label class="form-label fw-bold">ID del Incidente</label>
              <input type="text" class="form-control" id="alertaId" placeholder="Ej. ALERTA-001 o CVE-2026..." required>
            </div>
            <div class="col-md-6">
              <label class="form-label fw-bold">Tipo de Alerta</label>
              <select class="form-select" id="alertaTipo" required>
                <option value="" selected disabled>Seleccione del catálogo...</option>
                <option value="Malware">Malware (Código malicioso)</option>
                <option value="Phishing">Phishing (Intento de fraude)</option>
                <option value="Intrusión">Intrusión (Acceso no autorizado)</option>
                <option value="Fuga de información">Fuga de información (Exfiltración)</option>
                <option value="Vulnerabilidad">Vulnerabilidad (Debilidad explotable)</option>
              </select>
            </div>
          </div>

          <div class="row mb-3">
            <div class="col-md-12">
              <label class="form-label fw-bold">Activo Afectado</label>
              <select class="form-select" id="alertaActivo" required>
                <option value="" selected disabled>Seleccione el tipo de activo...</option>
                <option value="Servidor">Servidor (Ej. Servidor de aplicaciones)</option>
                <option value="Endpoint">Endpoint (Ej. Laptop usuario)</option>
                <option value="Aplicación">Aplicación (Ej. Sistema institucional)</option>
                <option value="Red">Red (Ej. Firewall, Switch)</option>
                <option value="Librerías">Librerías (Dependencias)</option>
              </select>
            </div>
          </div>

          <hr class="my-4">
          <h6 class="fw-bold text-secondary mb-3">Cálculo de Severidad y SLA</h6>

          <div class="row mb-3">
            <div class="col-md-6">
              <label class="form-label fw-bold">Impacto Estimado</label>
              <select class="form-select" id="alertaImpacto" required>
                <option value="" selected disabled>Seleccione...</option>
                <option value="Alto">Alto</option>
                <option value="Medio">Medio</option>
                <option value="Bajo">Bajo</option>
              </select>
            </div>
            <div class="col-md-6">
              <label class="form-label fw-bold">Probabilidad</label>
              <select class="form-select" id="alertaProbabilidad" required>
                <option value="" selected disabled>Seleccione...</option>
                <option value="Alta">Alta</option>
                <option value="Media">Media</option>
                <option value="Baja">Baja</option>
              </select>
            </div>
          </div>

          <div class="alert alert-light border text-center mt-3" role="alert">
            <h6 class="mb-1">Severidad Resultante: <span id="resultadoSeveridad" class="badge bg-secondary fs-6">Pendiente</span></h6>
            <small id="resultadoSLA" class="text-muted">Seleccione Impacto y Probabilidad para calcular el SLA.</small>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
        <button type="button" class="btn btn-primary" id="btnGuardarAlerta">Registrar Alerta</button>
      </div>
    </div>
  </div>
</div>
